name: EKS Cluster - Destroy

on:
  workflow_dispatch:

env:
  TF_WORKSPACE: eks-cluster
  TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

jobs:
  # ------------------------------------------------------------------
  # Job 1: Eliminar hipster-shop del cluster antes de destruir la infra
  # ------------------------------------------------------------------
  delete-hipster-shop:
    name: Delete Hipster Shop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar que el workspace existe en Terraform Cloud
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${{ secrets.TFC_ORG }}/workspaces/${TF_WORKSPACE}")

          if [ "$HTTP_STATUS" -eq 404 ]; then
            echo "El workspace '${TF_WORKSPACE}' no existe. No hay nada que destruir."
            exit 1
          else
            echo "Workspace '${TF_WORKSPACE}' encontrado (HTTP $HTTP_STATUS), procediendo..."
          fi

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform con Terraform Cloud
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFC_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: eks
        run: terraform init
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

      - name: Obtener nombre del cluster EKS
        id: cluster
        working-directory: eks
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ steps.cluster.outputs.name }}

      - name: Eliminar hipster-shop del cluster
        run: |
          kubectl delete -f hipster-shop/kubernetes-manifests.yaml --ignore-not-found=true

      - name: Esperar que todos los LoadBalancers sean eliminados en AWS
        run: |
          echo "Esperando eliminación de todos los Services tipo LoadBalancer..."
          LB_SERVICES=$(kubectl get svc --all-namespaces -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}')
          if [ -z "$LB_SERVICES" ]; then
            echo "No hay LoadBalancers activos."
          else
            echo "LoadBalancers encontrados: $LB_SERVICES"
            kubectl delete svc --all-namespaces -l app --field-selector spec.type=LoadBalancer --ignore-not-found=true || true
          fi

          echo "Esperando 60s para que AWS elimine los ELBs y sus Security Groups..."
          sleep 60

          # Verificar que no queden ELBs activos en AWS
          REMAINING=$(aws elb describe-load-balancers --query 'LoadBalancerDescriptions[*].LoadBalancerName' --output text 2>/dev/null || true)
          REMAINING_V2=$(aws elbv2 describe-load-balancers --query 'LoadBalancers[*].LoadBalancerArn' --output text 2>/dev/null || true)
          if [ -n "$REMAINING" ] || [ -n "$REMAINING_V2" ]; then
            echo "Aún hay ELBs activos, esperando 60s adicionales..."
            sleep 60
          fi

      - name: Eliminar PersistentVolumeClaims para liberar EBS volumes
        run: |
          kubectl delete pvc --all --all-namespaces --ignore-not-found=true || true
          echo "Esperando 30s para que AWS libere los EBS volumes..."
          sleep 30

      - name: Liberar ENIs del cluster antes del destroy
        run: |
          CLUSTER_NAME="${{ steps.cluster.outputs.name }}"
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${CLUSTER_NAME}-vpc" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")

          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "VPC encontrada: $VPC_ID. Verificando ENIs huérfanas..."
            ENI_IDS=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${VPC_ID}" "Name=status,Values=available" \
              --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text)
            for ENI in $ENI_IDS; do
              echo "Eliminando ENI huérfana: $ENI"
              aws ec2 delete-network-interface --network-interface-id "$ENI" || true
            done
          else
            echo "No se encontró la VPC o ya fue eliminada."
          fi

  # ------------------------------------------------------------------
  # Job 2: Destruir la infraestructura EKS con Terraform
  # ------------------------------------------------------------------
  terraform-destroy:
    name: Destroy EKS Cluster
    runs-on: ubuntu-latest
    needs: delete-hipster-shop
    defaults:
      run:
        working-directory: eks

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar que el workspace existe en Terraform Cloud
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${{ secrets.TFC_ORG }}/workspaces/${TF_WORKSPACE}")

          if [ "$HTTP_STATUS" -eq 404 ]; then
            echo "El workspace '${TF_WORKSPACE}' no existe. No hay nada que destruir."
            exit 1
          else
            echo "Workspace '${TF_WORKSPACE}' encontrado (HTTP $HTTP_STATUS), procediendo con destroy..."
          fi

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform con Terraform Cloud
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFC_TOKEN }}

      - name: Terraform Init
        id: init
        run: terraform init
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR }}
          TF_VAR_outside_subnets: ${{ vars.OUTSIDE_SUBNETS }}
          TF_VAR_private_subnets: ${{ vars.PRIVATE_SUBNETS }}
          TF_VAR_workload_subnets: ${{ vars.WORKLOAD_SUBNETS }}

      - name: Eliminar workspace de Terraform Cloud
        if: success()
        run: |
          echo "Eliminando workspace '${TF_WORKSPACE}' de Terraform Cloud..."
          curl -s \
            --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            --request DELETE \
            "https://app.terraform.io/api/v2/organizations/${{ secrets.TFC_ORG }}/workspaces/${TF_WORKSPACE}"
          echo "Workspace '${TF_WORKSPACE}' eliminado."
