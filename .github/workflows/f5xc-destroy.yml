name: F5 XC – Destroy AWS VPC Site

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe DESTROY para confirmar la eliminación del site"
        required: true

# ─── Secrets requeridos ───────────────────────────────────────────────────────
#   AWS_ACCESS_KEY_ID         → IAM Access Key
#   AWS_SECRET_ACCESS_KEY     → IAM Secret Key
#   XC_API_P12_FILE           → cat api-creds.p12 | base64 -w0
#   XC_API_URL                → https://<tenant>.console.ves.volterra.io/api
#   XC_P12_PASSWORD           → contraseña del .p12 en texto plano
#   XC_TENANT                 → nombre del tenant (ej: my-company)
#   TFC_TOKEN                 → token de API de Terraform Cloud
#   TFC_ORG                   → nombre de la organización en Terraform Cloud
#
# ─── Variables de repositorio requeridas ──────────────────────────────────────
#   AWS_REGION           → ej: us-east-1
#   SITE_NAME_AWS        → ej: aws-vpc-site-demo
#   AWS_VPC_CIDR         → 192.168.0.0/16
#   AWS_XC_HW_PROFILE    → perfil de red del CE (ej: aws-byol-multi-nic-voltmesh)
#   TFC_WORKSPACE        → nombre del workspace (ej: f5xc-aws-site)

permissions:
  contents: read

env:
  TF_WORKING_DIR: ./f5xc

jobs:
  terraform-destroy:
    name: "Destroy · F5 XC AWS VPC Site"
    runs-on: ubuntu-latest
    environment: production   # requiere aprobación manual si está configurado

    env:
      VOLT_API_P12_FILE: ./api.p12
      VOLT_API_URL: ${{ secrets.XC_API_URL }}
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}
      TF_WORKSPACE: ${{ vars.TFC_WORKSPACE }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Verify confirmation input
        if: ${{ github.event.inputs.confirm != 'DESTROY' }}
        run: |
          echo "❌ Confirmación incorrecta. Escribe exactamente 'DESTROY' para continuar."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Write F5 XC API credentials
        env:
          XC_API_P12_FILE: ${{ secrets.XC_API_P12_FILE }}
        run: |
          # XC_API_P12_FILE contiene el .p12 en base64
          # XC_P12_PASSWORD se pasa directamente como VES_P12_PASSWORD (texto plano)
          printf '%s' "${XC_API_P12_FILE}" | tr -d '\n\r ' | base64 -d > api.p12
          chmod 600 api.p12

      - name: Create TFC workspace if not exists
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORG: ${{ secrets.TFC_ORG }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${TFC_ORG}/workspaces/${{ vars.TFC_WORKSPACE }}")

          if [ "$STATUS" = "404" ]; then
            echo "Workspace '${{ vars.TFC_WORKSPACE }}' no existe, creando..."
            curl -s --fail \
              --header "Authorization: Bearer ${TFC_TOKEN}" \
              --header "Content-Type: application/vnd.api+json" \
              --request POST \
              --data '{
                "data": {
                  "type": "workspaces",
                  "attributes": {
                    "name": "${{ vars.TFC_WORKSPACE }}",
                    "execution-mode": "local"
                  }
                }
              }' \
              "https://app.terraform.io/api/v2/organizations/${TFC_ORG}/workspaces"
            echo "Workspace creado."
          else
            echo "Workspace '${{ vars.TFC_WORKSPACE }}' ya existe (HTTP $STATUS)."
          fi

      - name: Terraform Init
        run: terraform init -input=false

      - name: Generate tfvars
        run: |
          cat <<EOF > ci.auto.tfvars
          f5xc_tenant          = "${{ secrets.XC_TENANT }}"
          site_name            = "${{ vars.SITE_NAME_AWS }}"
          aws_region           = "${{ vars.AWS_REGION }}"
          aws_access_key       = "${{ secrets.AWS_ACCESS_KEY_ID }}"
          aws_secret_key       = "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          aws_credentials_name = "${{ vars.SITE_NAME_AWS }}-creds"
          vpc_cidr             = "${{ vars.AWS_VPC_CIDR }}"
          az_names             = ["${{ vars.AWS_REGION }}a", "${{ vars.AWS_REGION }}b"]
          certified_hw         = "${{ vars.AWS_XC_HW_PROFILE }}"
          EOF

      - name: Terraform Plan (destroy)
        run: |
          terraform plan -input=false -destroy -out=tfplan-destroy

      - name: Terraform Destroy
        run: terraform apply -input=false -auto-approve tfplan-destroy

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f api.p12
          rm -f ci.auto.tfvars
