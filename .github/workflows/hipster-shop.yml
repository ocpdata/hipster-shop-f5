name: Hipster Shop - Deploy (F5 XC)

on:
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # Desplegar hipster-shop en el cluster EKS existente
  # El frontend se expone a través de F5 Distributed Cloud (proxy HTTP)
  # ------------------------------------------------------------------
  deploy:
    name: Deploy Hipster Shop (F5 XC)
    runs-on: ubuntu-latest

    env:
      TF_WORKSPACE: eks-cluster
      TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform con Terraform Cloud
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFC_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: eks
        run: terraform init
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

      - name: Obtener nombre del cluster EKS
        id: cluster
        working-directory: eks
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ steps.cluster.outputs.name }}

      - name: Desplegar hipster-shop
        run: |
          kubectl apply -f hipster-shop/kubernetes-manifests.yaml --validate=false

      - name: Verificar rollout de los deployments
        run: |
          kubectl rollout status deployment/emailservice --timeout=180s
          kubectl rollout status deployment/checkoutservice --timeout=180s
          kubectl rollout status deployment/recommendationservice --timeout=180s
          kubectl rollout status deployment/frontend --timeout=300s
          kubectl rollout status deployment/paymentservice --timeout=180s
          kubectl rollout status deployment/productcatalogservice --timeout=180s
          kubectl rollout status deployment/cartservice --timeout=180s
          kubectl rollout status deployment/loadgenerator --timeout=180s
          kubectl rollout status deployment/currencyservice --timeout=180s
          kubectl rollout status deployment/shippingservice --timeout=180s
          kubectl rollout status deployment/redis-cart --timeout=180s

      - name: Mostrar estado de los servicios
        run: |
          echo "=== Servicios desplegados ==="
          kubectl get svc
          echo ""
          echo "=== Pods en ejecución ==="
          kubectl get pods
